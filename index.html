<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raytech Promos | Festa Total!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: #fff; /* Fundo branco para garantir clareza */
            overflow: hidden;
        }

        /* --- 1. BACKGROUND (BEM CLARO) --- */
        .main-wrapper {
            /* Mantendo o fundo bem claro com branco e pouca opacidade */
            background-image: linear-gradient(rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.1)), url('13.png');
            background-size: cover;
            background-position: center;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1; /* Camada base */
        }

        /* --- 2. CHUVA DE CONFETES (CAMADA DO MEIO) --- */
        .confetti {
            position: absolute;
            z-index: 2; /* Fica à frente do background, mas atrás do card */
            top: -20px;
            border-radius: 2px;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(105vh) rotate(720deg); }
        }

        /* --- 3. CARD CENTRAL (FRENTE) --- */
        .glass-card {
            /* Degradê Azul Vibrante e Ligeiramente Transparente */
            background: linear-gradient(135deg, rgba(33, 150, 243, 0.9) 0%, rgba(13, 71, 161, 0.95) 100%);
            backdrop-filter: blur(8px);
            padding: 40px 20px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            max-width: 700px;
            width: 90%;
            border: 4px solid rgba(255, 255, 255, 0.6);
            text-align: center;
            color: #fff;
            position: relative;
            z-index: 3; /* Fica à frente de tudo */
        }

        h1 {
            font-size: 3.8rem;
            color: #ffea00; /* Amarelo Vibrante */
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 900;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.6);
        }

        .subtitle { font-size: 1.3rem; margin-bottom: 30px; font-weight: 700; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 20px;
        }

        .logo-container img {
            height: 55px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.4));
            animation: pulse-logo 2s infinite ease-in-out;
        }

        @keyframes pulse-logo {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* =========================================
           --- 4. BOTÃO WHATSAPP ULTRA ANIMADO --- 
           ========================================= */
        .btn-whatsapp {
            display: inline-block;
            background: #25d366; /* Verde WhatsApp */
            color: white;
            padding: 22px 50px;
            font-size: 1.7rem;
            font-weight: 900;
            text-decoration: none;
            border-radius: 60px;
            position: relative;
            overflow: visible; /* Importante para o brilho neon sair do botão */
            
            /* -- COMBO DE ANIMAÇÕES DO BOTÃO -- */
            /* 1. Pulsar Neon (glow), 2. Balanço Agitado (shake) */
            animation: 
                whatsapp-glow 1.5s infinite alternate, /* Pulsar Neon Contínuo */
                whatsapp-shake 3s infinite;           /* Balanço Agitado de tempos em tempos */
                
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.6);
            transition: transform 0.2s;
        }

        /* Efeito ao passar o mouse */
        .btn-whatsapp:hover {
            transform: scale(1.05); /* Aumenta ligeiramente */
            animation-play-state: paused; /* Pausa o shake para facilitar o clique */
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.8);
        }

        /* Estilo para o foguete dentro do botão */
        .btn-whatsapp .rocket-emoji {
            display: inline-block;
            margin-right: 10px;
            /* 3. Foguete em Movimento (decolagem) */
            animation: rocket-launch 1s infinite ease-in-out alternate;
        }

        /* --- KEYFRAMES DAS ANIMAÇÕES --- */

        /* 1. Pulsar Neon (Glow) */
        @keyframes whatsapp-glow {
            from { box-shadow: 0 0 10px rgba(37, 211, 102, 0.6), 0 0 20px rgba(37, 211, 102, 0.4); }
            to { box-shadow: 0 0 25px rgba(37, 211, 102, 1), 0 0 40px rgba(37, 211, 102, 0.7); }
        }

        /* 2. Balanço Agitado (Shake) - Acontece de tempos em tempos */
        @keyframes whatsapp-shake {
            0%, 90% { transform: rotate(0deg); } /* Fica parado a maior parte do tempo */
            92% { transform: rotate(3deg); }
            94% { transform: rotate(-3deg); }
            96% { transform: rotate(2deg); }
            98% { transform: rotate(-2deg); }
            100% { transform: rotate(0deg); } /* Volta à posição inicial */
        }

        /* 3. Foguete em Decolagem (Subida e Descida sutil) */
        @keyframes rocket-launch {
            from { transform: translateY(0); }
            to { transform: translateY(-8px); } /* Sobe 8px simulando decolagem */
        }

        /* Rodapé sutil */
        footer {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #ddd;
            font-weight: 600;
        }

        /* Responsividade para Mobile */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; letter-spacing: -1px; }
            .logo-container img { height: 40px; }
            .btn-whatsapp { font-size: 1.3rem; padding: 18px 35px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-wrapper" id="bg">
        <div class="glass-card">
            <h1>Raytech Promos</h1>
            <p class="subtitle">A maior festa de ofertas da internet, direto no seu WhatsApp!</p>
            
            <div class="logo-container">
                <img src="Shopee_logo.svg.png" alt="Shopee">
                <img src="mercado livre.jpg" alt="Mercado Livre">
                <img src="amazon.png" alt="Amazon">
                <img src="aliexpress.png" alt="AliExpress">
                <img src="shein.webp" alt="Shein">
            </div>

            <a href="https://chat.whatsapp.com/G1swG9HKGsFGX9CXpdsKYP" class="btn-whatsapp" target="_blank">
                <span class="rocket-emoji">🚀</span> ENTRAR NO GRUPO WHATSAPP!
            </a>

            <footer>
                &copy; 2026 Raytech Promos - Diversão e Economia Garantidas.
            </footer>
        </div>
    </div>

    <script>
        function createConfetti() {
            const colors = ['#ffea00', '#ff5722', '#2196f3', '#4caf50', '#e91e63', '#ffffff'];
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            
            confetti.style.left = Math.random() * 100 + "vw";
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.width = Math.random() * 8 + 4 + "px";
            confetti.style.height = Math.random() * 12 + 4 + "px";
            confetti.style.animationDuration = Math.random() * 3 + 2 + "s";
            confetti.style.opacity = Math.random();

            // Adiciona o confete dentro do wrapper para ele ficar entre o BG e o Card
            document.getElementById('bg').appendChild(confetti);

            setTimeout(() => { confetti.remove(); }, 5000);
        }
        setInterval(createConfetti, 100); // Chuva constante
    </script>

</body>
</html>
